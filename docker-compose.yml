version: "3.8"

services:
    database:
        image: postgres:13-alpine
        container_name: database_preparame
        restart: unless-stopped
        environment:
            POSTGRES_USER: docker
            POSTGRES_PASSWORD: admin@01
            POSTGRES_DB: preparame
        ports:
            - "5435:5432"
        volumes:
            - pgdata:/data/postgres
        networks:
            - app-network
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U docker -d preparame"]
            interval: 10s
            timeout: 5s
            retries: 5

    app:
        build: 
            context: .
            dockerfile: Dockerfile
        container_name: preparame_app
        restart: unless-stopped
        environment:
            NODE_ENV: development
            DB_HOST: database
            DB_PORT: 5432
            DB_USER: docker
            DB_PASS: admin@01
            DB_NAME: preparame
        ports:
            - "3334:3334"
            - "3335:3335" 
            - "9230:9230"
        volumes:
            - .:/usr/app
            - /usr/app/node_modules
        networks:
            - app-network
        depends_on:
            database:
                condition: service_healthy
        entrypoint: ["bash", "/usr/app/scripts/docker-entrypoint.sh"]
        command: ["npm", "run", "dev"]

networks:
    app-network:
        driver: bridge

volumes:
    pgdata:
        driver: local
