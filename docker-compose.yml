version: "3.8"

services:
    database:
        image: postgres:13-alpine
        container_name: database_preparame
        restart: unless-stopped
        environment:
            POSTGRES_USER: docker
            POSTGRES_PASSWORD: admin@01
            POSTGRES_DB: preparame
            PGDATA: /data/postgres
            POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
        ports:
            - "5435:5432"
        volumes:
            - pgdata:/data/postgres
            - ./dumps:/docker-entrypoint-initdb.d
        networks:
            - preparame
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U docker -d preparame"]
            interval: 5s
            timeout: 3s
            retries: 10
            start_period: 10s

    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: preparame_app
        restart: unless-stopped
        depends_on:
            database:
                condition: service_healthy
        env_file:
            - .env
        environment:
            NODE_ENV: development
            DB_HOST: database
            DB_PORT: "5432"
            DB_USER: ${DB_USER:-docker}
            DB_PASS: ${DB_PASS:-admin@01}
            DB_NAME: ${DB_NAME:-preparame}
        ports:
            - "3334:3334"
            - "3335:3335"
            - "9230:9230"
        volumes:
            - .:/usr/app
            - /usr/app/node_modules
        networks:
            - preparame
        entrypoint: ["bash", "/usr/app/scripts/docker-entrypoint.sh"]
        command: ["npm", "run", "dev"]

networks:
    preparame:
        driver: bridge

volumes:
    pgdata:
        driver: local
