# LEGADO: banco PostgreSQL em container Docker.
# Preferir PostgreSQL no Windows (scripts/setup-windows-postgres.ps1).
version: "3.8"

services:
    database:
        image: postgres:13-alpine
        container_name: database_preparame
        restart: unless-stopped
        environment:
            POSTGRES_USER: docker
            POSTGRES_PASSWORD: admin@01
            POSTGRES_DB: preparame
            PGDATA: /data/postgres
            POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
        ports:
            - "5435:5432"
        volumes:
            - pgdata:/data/postgres
            - ./dumps:/docker-entrypoint-initdb.d
        networks:
            - app-network
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U docker -d preparame"]
            interval: 5s
            timeout: 3s
            retries: 10
            start_period: 10s

networks:
    app-network:
        driver: bridge

volumes:
    pgdata:
        driver: local